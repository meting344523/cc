<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>量化系统推荐报告</title>
  <style>
    body { font-family: "Microsoft YaHei", sans-serif; background: #f8f9fa; color: #333; padding: 20px; }
    h1, h2 { text-align: center; }
    .section { background: #fff; padding: 20px; margin: 30px auto; border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); max-width: 1000px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #dee2e6; padding: 8px; text-align: center; }
    th { background-color: #007bff; color: white; }
    .score-strong { font-weight: bold; color: #d63384; }
  </style>
</head>
<body>
  <h1>24小时量化推荐系统</h1>

  <div class="section">
    <h2>📈 虚拟货币推荐</h2>
    <table id="crypto-table">
      <thead>
        <tr><th>名称</th><th>价格 (¥)</th><th>推荐指数</th><th>理由</th><th>买入点</th><th>止盈点</th><th>止损点</th></tr>
      </thead>
      <tbody><!-- 动态插入crypto-table数据 --></tbody>
    </table>
  </div>

  <div class="section">
    <h2>🏯 A股推荐</h2>
    <table id="stock-table">
      <thead>
        <tr><th>名称</th><th>价格 (¥)</th><th>推荐指数</th><th>理由</th><th>买入点</th><th>止盈点</th><th>止损点</th></tr>
      </thead>
      <tbody><!-- 动态插入stock-table数据 --></tbody>
    </table>
  </div>

  <div class="section">
    <h2>💰 基金推荐</h2>
    <table id="fund-table">
      <thead>
        <tr><th>名称</th><th>价格 (¥)</th><th>推荐指数</th><th>理由</th><th>买入点</th><th>止盈点</th><th>止损点</th></tr>
      </thead>
      <tbody><!-- 动态插入fund-table数据 --></tbody>
    </table>
  </div>

  <script>
    function fillTable(data, tableId) {
      const table = document.getElementById(tableId).querySelector('tbody');
      table.innerHTML = '';  // 清空旧数据
      data.forEach(row => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${row.name}</td>
          <td>${row.price}</td>
          <td class="score-strong">${row.score}/10</td>
          <td>${row.reason}</td>
          <td>${row.entry}</td>
          <td>${row.target}</td>
          <td>${row.stop}</td>
        `;
        table.appendChild(tr);
      });
    }
    // 动态插入crypto-table数据
    // 动态插入stock-table数据
    // 动态插入fund-table数据
  </script>
</body>
</html>
